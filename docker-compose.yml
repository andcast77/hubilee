# Unified hubilee stack — optional self-hosted path (Postgres, API, Caddy, four Next apps).
# Production target is Vercel + Neon; use each app's env on Vercel (see apps/*/ .env.example).
#
# Usage: docker compose up --build -d
# Root `.env` = Compose infra/URLs only. API secrets = apps/api/.env
#   cp .env.example .env
#   cp apps/api/.env.example apps/api/.env   # then fill JWT_SECRET, FIELD_ENCRYPTION_KEY, …

x-app-env: &app-env
  NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
  API_INTERNAL_URL: ${API_INTERNAL_URL:-http://api:3000}
  NODE_ENV: ${NODE_ENV:-production}

x-next-build-args: &next-build-args
  NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
  NEXT_PUBLIC_HUB_URL: ${HUB_URL:-http://localhost:3001}
  NEXT_PUBLIC_POS_URL: ${POS_URL:-http://localhost:3002}
  NEXT_PUBLIC_HR_URL: ${HR_URL:-http://localhost:3003}
  NEXT_PUBLIC_TECH_URL: ${TECH_URL:-http://localhost:3004}

services:
  postgres:
    image: postgres:16-alpine
    container_name: ${STACK_NAME:-hubilee}-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hubilee}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hubilee}
      POSTGRES_DB: ${POSTGRES_DB:-hubilee}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    networks:
      - caddy_network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-hubilee} -d ${POSTGRES_DB:-hubilee}']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: ${STACK_NAME:-hubilee}-api
    restart: unless-stopped
    # Same keys as Vercel / local pnpm dev — do not duplicate them in root .env
    env_file:
      - path: ./apps/api/.env
        required: true
    environment:
      PORT: '3000'
      NODE_ENV: ${NODE_ENV:-production}
      # Always use the Compose Postgres service (overrides DATABASE_URL from env_file)
      DATABASE_URL: postgresql://${POSTGRES_USER:-hubilee}:${POSTGRES_PASSWORD:-hubilee}@postgres:5432/${POSTGRES_DB:-hubilee}
      PRISMA_USE_PG_ADAPTER: 'true'
      TRUST_PROXY: 'true'
      # Prefer Hub public URL from Compose when set
      HUB_PUBLIC_URL: ${HUB_URL:-http://localhost:3001}
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - caddy_network

  caddy:
    image: caddy:2-alpine
    container_name: ${STACK_NAME:-hubilee}-caddy
    restart: unless-stopped
    environment:
      API_DOMAIN: ${API_DOMAIN:-api.hubilee.app}
      HUB_DOMAIN: ${HUB_DOMAIN:-hub.hubilee.app}
      HR_DOMAIN: ${HR_DOMAIN:-rrhh.hubilee.app}
      POS_DOMAIN: ${POS_DOMAIN:-pos.hubilee.app}
      TECH_DOMAIN: ${TECH_DOMAIN:-tech.hubilee.app}
      UPDATE_DOMAIN: ${UPDATE_DOMAIN:-update.hubilee.app}
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    networks:
      - caddy_network
    depends_on:
      - api
      - hub

  hub:
    build:
      context: .
      dockerfile: docker/Dockerfile.nextjs
      args:
        <<: *next-build-args
        PACKAGE: '@hubilee/hub'
        APP_DIR: hub
        PORT: '3001'
        NEXT_PUBLIC_HUB_URL: ${HUB_URL?HUB_URL is required}
        NEXT_PUBLIC_POS_URL: ${POS_URL?POS_URL is required}
        NEXT_PUBLIC_HR_URL: ${HR_URL?HR_URL is required}
        NEXT_PUBLIC_TECH_URL: ${TECH_URL:-http://localhost:3004}
    container_name: ${STACK_NAME:-hubilee}-hub
    restart: unless-stopped
    environment:
      <<: *app-env
      PORT: '3001'
    networks:
      - caddy_network
    depends_on:
      - api

  pos:
    build:
      context: .
      dockerfile: docker/Dockerfile.nextjs
      args:
        <<: *next-build-args
        PACKAGE: '@hubilee/pos'
        APP_DIR: pos
        PORT: '3002'
        NEXT_PUBLIC_POS_URL: ${POS_URL?POS_URL is required}
        NEXT_PUBLIC_HUB_URL: ${HUB_URL?HUB_URL is required}
        NEXT_PUBLIC_HR_URL: ${HR_URL?HR_URL is required}
    container_name: ${STACK_NAME:-hubilee}-pos
    restart: unless-stopped
    environment:
      <<: *app-env
      PORT: '3002'
    ports:
      - '3002:3002'
    networks:
      - caddy_network
    depends_on:
      - api

  hr:
    build:
      context: .
      dockerfile: docker/Dockerfile.nextjs
      args:
        <<: *next-build-args
        PACKAGE: '@hubilee/hr'
        APP_DIR: hr
        PORT: '3003'
        NEXT_PUBLIC_HR_URL: ${HR_URL?HR_URL is required}
        NEXT_PUBLIC_HUB_URL: ${HUB_URL?HUB_URL is required}
    container_name: ${STACK_NAME:-hubilee}-hr
    restart: unless-stopped
    environment:
      <<: *app-env
      PORT: '3003'
    networks:
      - caddy_network
    depends_on:
      - api

  tech:
    build:
      context: .
      dockerfile: docker/Dockerfile.nextjs
      args:
        <<: *next-build-args
        PACKAGE: '@hubilee/tech'
        APP_DIR: tech
        PORT: '3004'
        NEXT_PUBLIC_TECH_URL: ${TECH_URL:-http://localhost:3004}
    container_name: ${STACK_NAME:-hubilee}-tech
    restart: unless-stopped
    environment:
      <<: *app-env
      PORT: '3004'
    networks:
      - caddy_network
    depends_on:
      - api

networks:
  caddy_network:
    name: ${NETWORK_NAME:-hubilee-caddy-network}
    driver: bridge

volumes:
  postgres_data:
  caddy_data:
